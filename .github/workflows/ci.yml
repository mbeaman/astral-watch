name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Doc warnings
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Build (release)
        run: cargo build --release --locked

  msrv:
    name: MSRV (1.85, default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      # default build must stay lean; the tui feature deliberately needs a newer toolchain
      - run: cargo check --locked --all-targets

  tui:
    name: tui feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # build, lint, and run the optional feature's tests (incl. the headless TestBackend
      # render tests) so it can't rot
      - run: cargo clippy --features tui --all-targets -- -D warnings
      - run: cargo test --features tui

  safety:
    name: safety feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # the opt-in NVML power-cap daemon; nvml-wrapper dlopens libnvidia-ml at runtime, so it
      # builds and the (NVML-free) unit tests run on a driverless CI runner
      - run: cargo clippy --features safety --all-targets -- -D warnings
      - run: cargo test --features safety

  publish-dry-run:
    name: crates.io packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --dry-run --locked

  packaging:
    name: make install + unit validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Staged install
        run: make install DESTDIR="$PWD/stage" PREFIX=/usr
      - name: All artifacts land where packagers expect
        run: |
          test -x stage/usr/bin/astral-watch
          test -f stage/usr/lib/udev/rules.d/99-astral-watch.rules
          test -f stage/etc/astral-watch.toml
          test -f stage/usr/lib/systemd/system/astral-watch.service
          test -f stage/usr/lib/sysusers.d/astral-watch.conf
          test -f stage/usr/lib/modules-load.d/astral-watch.conf
          grep -q 'ExecStart=/usr/bin/astral-watch' stage/usr/lib/systemd/system/astral-watch.service
      - name: Validate systemd unit
        run: |
          sudo install -Dm755 stage/usr/bin/astral-watch /usr/bin/astral-watch
          # systemd-sysusers needs an absolute config path (a positional arg is not opened
          # relative to the CWD); $PWD expands before sudo runs
          sudo systemd-sysusers "$PWD/stage/usr/lib/sysusers.d/astral-watch.conf"
          # confirm the snippet actually created the account the unit's User=/Group= need
          getent group i2c
          getent passwd astral-watch
          sudo systemd-analyze verify "$PWD/stage/usr/lib/systemd/system/astral-watch.service"
      - name: Validate udev rule
        run: sudo udevadm verify --resolve-names=never packaging/99-astral-watch.rules

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # audit-check creates a check run when it finds advisories
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
