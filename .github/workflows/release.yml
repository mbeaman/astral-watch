name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, x86_64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Smoke test
        run: target/${{ matrix.target }}/release/astral-watch --help
      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="astral-watch-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp target/${{ matrix.target }}/release/astral-watch "$name/"
          cp README.md CHANGELOG.md LICENSE "$name/"
          cp -r packaging "$name/packaging"
          cp -r docs "$name/docs"
          tar czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target }}
          path: |
            astral-watch-*.tar.gz
            astral-watch-*.tar.gz.sha256
          if-no-files-found: error

  # .deb + .rpm from one nfpm config, packaging the `make install` tree (one source of truth
  # for the file layout). Native build (no --target) so make install-files finds the binary
  # at target/release/. The default lean read-only build — the safety unit is not packaged.
  packages:
    name: deb + rpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
      - name: Build (native gnu, default features)
        run: cargo build --release --locked
      - name: Stage via make install
        run: make install DESTDIR="$PWD/stage" PREFIX=/usr
      - name: Package .deb and .rpm
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          nfpm package -f packaging/nfpm/nfpm.yaml -p deb -t dist/
          nfpm package -f packaging/nfpm/nfpm.yaml -p rpm -t dist/
          ( cd dist && for f in *.deb *.rpm; do sha256sum "$f" > "$f.sha256"; done )
          ls -l dist/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*
          if-no-files-found: error

  # publish atomically, only after every target built — a failed leg must never leave a
  # public half-empty release on the tag
  release:
    needs: [build, packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            astral-watch-*.tar.gz
            astral-watch-*.tar.gz.sha256
            astral-watch*.deb
            astral-watch*.rpm
            astral-watch*.deb.sha256
            astral-watch*.rpm.sha256
          body: >
            Prebuilt Linux binaries (gnu and static musl) plus `.deb` and `.rpm` packages. See
            [CHANGELOG.md](https://github.com/mbeaman/astral-watch/blob/main/CHANGELOG.md)
            for what changed. Debian/Ubuntu: `sudo apt install ./astral-watch_*.deb`; Fedora:
            `sudo dnf install ./astral-watch-*.rpm`; Arch: the AUR package; Nix:
            `nix run github:mbeaman/astral-watch`. From source: `sudo make install`.
